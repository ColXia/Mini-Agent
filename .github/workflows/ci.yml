name: Mini-Agent CI

'on':
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      release_handoff:
        description: "Run release handoff checklist (deterministic gate plus advisory summary)"
        required: false
        default: false
        type: boolean
      run_weekly_rollout_review_strict:
        description: "Optionally run strict weekly rollout review (runs matrix + strict KPI checklist)"
        required: false
        default: false
        type: boolean

jobs:
  stable-tests:
    name: Stable Tests (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Run Stable Test Suite
        run: python scripts/test_stable.py

  release-handoff:
    name: Release Handoff Checklist (workflow_dispatch)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_handoff == true }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Run Promotion Checklist
        run: python scripts/ci/release_promotion_checklist.py --studio-token studio-release-handoff-token

      - name: Validate Deterministic Gate Artifact (Required)
        run: python scripts/ci/check_deterministic_gate_artifact.py

      - name: Run P19 Runtime Matrix (Strict Weekly Review)
        if: ${{ inputs.run_weekly_rollout_review_strict == true }}
        run: python scripts/ci/p19_runtime_matrix.py

      - name: Run P19 Weekly Rollout Review (Strict)
        if: ${{ inputs.run_weekly_rollout_review_strict == true }}
        run: python scripts/ci/p19_weekly_rollout_review.py --window-days 7 --target-profile stage --strict --strict-targets

      - name: Upload Release Handoff Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-handoff-artifacts
          if-no-files-found: error
          path: |
            workspace/release_promotion/release_promotion_*.md
            workspace/release_gate/release_gate_deterministic_*.md
            workspace/release_gate/studio_ops_runtime_*.json
            workspace/p19_matrix/p19_runtime_matrix_*.md
            workspace/p19_rollout/p19_weekly_rollout_*.md
            workspace/p19_rollout/p19_weekly_rollout_*.json
