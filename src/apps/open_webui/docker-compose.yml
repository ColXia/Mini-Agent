services:
  mini-agent-gateway:
    profiles: ["with-gateway"]
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ../../..:/app
    env_file:
      - .env
    command: >
      sh -c "pip install --no-cache-dir -e . &&
      MINI_AGENT_STUDIO_HOST=0.0.0.0 MINI_AGENT_STUDIO_PORT=8008 MINI_AGENT_STUDIO_ENABLE_INSTANCE_LOCK=0
      python -m uvicorn apps.agent_studio_gateway.main:app --host 0.0.0.0 --port 8008"
    ports:
      - "8008:8008"

  mini-agent-openwebui-adapter:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ../../..:/app
    env_file:
      - .env
    command: >
      sh -c "pip install --no-cache-dir -r src/apps/open_webui/requirements.txt &&
      pip install --no-cache-dir -e . &&
      uvicorn apps.open_webui.main:app --host 0.0.0.0 --port 8010"
    ports:
      - "8010:8010"

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    environment:
      OPENAI_API_BASE_URL: http://mini-agent-openwebui-adapter:8010/v1
      OPENAI_API_KEY: ${MINI_AGENT_OPENWEBUI_PRIMARY_API_KEY}
    ports:
      - "3000:8080"
    depends_on:
      - mini-agent-openwebui-adapter
    volumes:
      - open-webui-data:/app/backend/data

volumes:
  open-webui-data:
